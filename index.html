<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>타이틀 보관함</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #ff6b8a;
    --accent-2: #ffb86b;
    --danger: #ff6b8a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
  header h1 {
    margin: 0 0 4px;
    font-size: 26px;
    letter-spacing: -0.3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p { margin: 0 0 24px; color: var(--muted); font-size: 14px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 12px; font-size: 15px; color: var(--muted);
    font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
  }

  .add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }
  .add-row input[type="text"],
  .add-row textarea {
    flex: 1 1 280px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    resize: vertical;
    min-height: 46px;
    line-height: 1.5;
  }
  .add-row input[type="text"]:focus,
  .add-row textarea:focus { border-color: var(--accent); }
  .add-hint {
    color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.5;
  }
  .add-hint .ok { color: #6bff9c; }

  .add-toolbar { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .vip-toggle {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .vip-toggle:hover { color: var(--text); }
  .vip-toggle.on {
    background: rgba(255,215,0,0.18);
    color: #ffd700;
    border-color: #ffd700;
    font-weight: 700;
  }
  .vip-toggle .state {
    font-size: 11px; opacity: 0.7; padding: 1px 6px;
    background: rgba(255,255,255,0.05); border-radius: 999px;
  }
  .vip-toggle.on .state { background: rgba(255,215,0,0.25); opacity: 1; }

  .vip-toggle.hit-toggle.on {
    background: rgba(255,138,61,0.18);
    color: #ff8a3d;
    border-color: #ff8a3d;
  }
  .vip-toggle.hit-toggle.on .state { background: rgba(255,138,61,0.28); }

  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0e1018; border: 0; padding: 11px 18px;
    border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .btn.ghost {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
  .btn.large { width: 100%; padding: 16px; font-size: 16px; margin-top: 12px; }

  .random-display {
    background: linear-gradient(135deg, rgba(255,107,138,0.12), rgba(255,184,107,0.12));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    min-height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
  }
  .random-display .pick {
    font-size: 24px; font-weight: 700; line-height: 1.4;
    word-break: keep-all;
  }
  .random-display .placeholder { color: var(--muted); font-size: 15px; }

  .mash-box { display: flex; flex-direction: column; gap: 8px; }
  .mash-item {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15.5px;
    line-height: 1.45;
    word-break: keep-all;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .mash-item:hover { border-color: var(--accent); }
  .mash-empty {
    text-align: center; color: var(--muted); padding: 24px 10px; font-size: 14px;
  }

  .cat-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0;
  }
  .cat-bar button {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-bar button:hover { color: var(--text); }
  .cat-bar button.on {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0e1018;
    border-color: transparent;
    font-weight: 700;
  }
  .cat-bar button .num {
    opacity: 0.7; margin-left: 4px; font-size: 11px;
  }

  .filter-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .filter-row input {
    flex: 1 1 200px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  .count { color: var(--muted); font-size: 13px; margin-left: auto; }

  .group { margin-bottom: 22px; }
  .group-title {
    font-size: 13px; color: var(--muted); margin: 0 0 8px;
    font-weight: 700; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .group-title .line { flex: 1; height: 1px; background: var(--border); }

  .list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .item .title { flex: 1; font-size: 15px; word-break: break-word; }
  .item .del {
    background: transparent; border: 0; color: var(--muted);
    cursor: pointer; padding: 6px 8px; border-radius: 6px; font-size: 18px;
    flex-shrink: 0;
  }
  .item .del:hover { color: var(--danger); background: rgba(255,107,138,0.08); }

  .cat-pill { position: relative; flex-shrink: 0; }
  .cat-pill select {
    appearance: none; -webkit-appearance: none;
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    padding: 3px 22px 3px 9px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    max-width: 140px;
  }
  .cat-pill::after {
    content: '▾';
    position: absolute;
    right: 7px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    font-size: 9px;
    opacity: 0.7;
  }
  .cat-pill select option { background: var(--panel); color: var(--text); }

  .empty { color: var(--muted); text-align: center; padding: 24px 10px; font-size: 14px; }

  .footer-actions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .footer-actions .small { font-size: 12px; padding: 8px 12px; }

  @media (max-width: 520px) {
    .wrap { padding: 20px 14px 60px; }
    header h1 { font-size: 22px; }
    .random-display .pick { font-size: 19px; }
  }

  /* ============================================================
   * 로그인 화면 / 사용자 바
   * ============================================================ */
  .auth-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .auth-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
  }
  .auth-card h2 {
    margin: 0 0 8px;
    font-size: 22px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .auth-card p {
    margin: 0 0 20px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }
  .auth-card input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    margin-bottom: 10px;
  }
  .auth-card input:focus { border-color: var(--accent); }
  .auth-card .auth-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0e1018;
    border: 0;
    padding: 12px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  .auth-card .auth-btn:disabled { opacity: 0.6; cursor: wait; }
  .auth-msg {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .auth-msg.ok { background: rgba(107,255,156,0.08); color: #6bff9c; border: 1px solid rgba(107,255,156,0.3); }
  .auth-msg.err { background: rgba(255,107,138,0.08); color: var(--danger); border: 1px solid rgba(255,107,138,0.3); }

  .user-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 12.5px;
  }
  .user-bar .email { color: var(--muted); flex: 1; word-break: break-all; }
  .user-bar .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .user-bar .logout-btn:hover { color: var(--text); }
  .user-bar .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6bff9c;
    box-shadow: 0 0 6px rgba(107,255,156,0.5);
    flex-shrink: 0;
  }
  .user-bar .sync-dot.syncing { background: var(--accent-2); animation: tv-pulse 1s infinite; }
  .user-bar .sync-dot.error { background: var(--danger); }
  @keyframes tv-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
</style>
</head>
<body>

<!-- 로그인 오버레이 (로그인 안된 상태에서만 표시) -->
<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-card">
    <h2>타이틀 보관함</h2>
    <p id="authStep1Hint">이메일 입력 → 인증코드를 메일로 받으세요</p>
    <p id="authStep2Hint" style="display:none">메일에 도착한 인증코드를 입력하세요</p>

    <!-- 1단계: 이메일 입력 -->
    <div id="authStep1">
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email" />
      <button class="auth-btn" id="authSendBtn">인증코드 받기</button>
    </div>

    <!-- 2단계: 코드 입력 -->
    <div id="authStep2" style="display:none">
      <input type="text" id="authCode" placeholder="인증코드 입력" inputmode="numeric" maxlength="10" autocomplete="one-time-code" />
      <button class="auth-btn" id="authVerifyBtn">로그인</button>
      <button class="auth-btn" id="authBackBtn" style="margin-top:8px;background:transparent;color:var(--muted);border:1px solid var(--border)">← 이메일 다시 입력</button>
    </div>

    <div class="auth-msg" id="authMsg" style="display:none"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <!-- 사용자 바 -->
  <div class="user-bar" id="userBar">
    <span class="sync-dot" id="syncDot" title="동기화 상태"></span>
    <span class="email" id="userEmail"></span>
    <button class="logout-btn" id="logoutBtn">로그아웃</button>
  </div>

  <header>
    <h1>타이틀 보관함</h1>
    <p>끌리는 타이틀을 모아두고, 카테고리별 랜덤 뽑기 + 랜덤 조합으로 영감받기</p>
  </header>

  <!-- 추가 (맨 위) -->
  <section class="card">
    <h2>새 타이틀 추가</h2>
    <div class="add-row">
      <textarea id="newTitle" rows="2" placeholder="타이틀 입력 후 Enter (여러 줄 붙여넣으면 각 줄이 따로 저장돼요)"></textarea>
      <button class="btn" id="addBtn">추가</button>
    </div>
    <div class="add-toolbar">
      <button class="vip-toggle" id="vipToggle" type="button" title="켜져 있으면 추가하는 모든 타이틀이 VIP로 저장됩니다">
        👑 VIP로 추가 <span class="state">OFF</span>
      </button>
    </div>
    <div class="add-toolbar">
      <button class="vip-toggle hit-toggle" id="hitToggle" type="button" title="켜져 있으면 추가하는 모든 항목이 히트단어로 저장됩니다 (외모 하락장, 족저근막염 같은 짧은 키워드용)">
        🔥 히트단어로 추가 <span class="state">OFF</span>
      </button>
    </div>
    <div class="add-hint" id="addHint">
      Enter = 추가 · Shift+Enter = 줄바꿈 · 앞에 <code>*</code> 또는 위 토글로 👑 VIP · 빈 줄/구분선(<code>-</code>, <code>=</code>) 자동 무시
    </div>
  </section>

  <!-- 랜덤 뽑기 -->
  <section class="card">
    <h2>🎲 랜덤 뽑기</h2>
    <div class="random-display" id="randomBox">
      <div class="placeholder">버튼을 눌러 타이틀을 뽑아보세요</div>
    </div>
    <div class="cat-bar" id="randomCatBar"></div>
    <button class="btn large" id="pickBtn">🎲 뽑기</button>
  </section>

  <!-- 랜덤 조합 (신규) -->
  <section class="card">
    <h2>🔀 랜덤 조합</h2>
    <div class="mash-box" id="mashupBox">
      <div class="mash-empty">버튼을 누르면 저장된 타이틀들을 분해해서 새로운 조합을 만들어드려요</div>
    </div>
    <button class="btn large" id="mashBtn">🔀 조합 만들기</button>
  </section>

  <!-- 리스트 -->
  <section class="card">
    <h2>전체 리스트</h2>
    <div class="footer-actions">
      <button class="btn ghost small" id="claudeCopyBtn">🤖 클로드용 복사</button>
      <button class="btn ghost small" id="exportTxtBtn">📄 텍스트로 내보내기</button>
      <button class="btn ghost small" id="exportBtn">백업 (JSON)</button>
      <button class="btn ghost small" id="importBtn">가져오기</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
      <button class="btn danger small" id="clearBtn">전체 삭제</button>
    </div>
    <div class="filter-row">
      <input id="search" type="text" placeholder="검색..." />
      <span class="count" id="count">0개</span>
    </div>
    <div class="cat-bar" id="filterCatBar"></div>
    <div id="content"></div>
  </section>
</div>

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.supabase = supabase; // for debugging in console

/* ============================================================
 * 카테고리 정의 (세분화)
 * ============================================================ */
const CATEGORIES = [
  { key: 'vip',      label: '👑 VIP' },
  { key: 'hitword',  label: '🔥 히트단어' },
  { key: 'template', label: '템플릿' },
  { key: 'kpop',     label: 'K-POP/아이돌' },
  { key: 'actor',    label: '배우/드라마' },
  { key: 'variety',  label: '예능/방송' },
  { key: 'movie',    label: '영화' },
  { key: 'youtube',  label: '유튜브' },
  { key: 'sns',      label: 'SNS/인플루언서' },
  { key: 'stock',    label: '주식' },
  { key: 'coin',     label: '코인' },
  { key: 'realestate', label: '부동산' },
  { key: 'money',    label: '재테크/돈' },
  { key: 'politics', label: '정치/시사' },
  { key: 'incident', label: '사건/사고' },
  { key: 'world',    label: '국제' },
  { key: 'love',     label: '연애/데이트' },
  { key: 'family',   label: '결혼/가족' },
  { key: 'food',     label: '음식/맛집' },
  { key: 'travel',   label: '여행/숙박' },
  { key: 'fashion',  label: '패션/뷰티' },
  { key: 'fitness',  label: '다이어트/운동' },
  { key: 'health',   label: '의학/건강' },
  { key: 'work',     label: '직장 생활' },
  { key: 'career',   label: '공부/취업' },
  { key: 'biz',      label: '창업/사업' },
  { key: 'sports',   label: '스포츠' },
  { key: 'game',     label: '게임' },
  { key: 'it',       label: 'IT/테크' },
  { key: 'car',      label: '자동차' },
  { key: 'pet',      label: '반려동물' },
  { key: 'baby',     label: '육아' },
  { key: 'humor',    label: '유머/짤' },
  { key: 'daily',    label: '일상/공감' },
  { key: 'shock',    label: '충격/반전' },
  { key: 'phrase',   label: '표현/단어' },
  { key: 'etc',      label: 'ETC' },
];
const CAT_LABEL = Object.fromEntries(CATEGORIES.map(c => [c.key, c.label]));

/* 카테고리별 색상 */
function catColors(key) {
  const fixed = {
    vip:      { fg: '#ffd700', bg: 'rgba(255,215,0,0.18)' },
    hitword:  { fg: '#ff8a3d', bg: 'rgba(255,138,61,0.18)' },
    etc:      { fg: '#8b93a7', bg: 'rgba(139,147,167,0.10)' },
    phrase:   { fg: '#ffd96b', bg: 'rgba(255,217,107,0.10)' },
    template: { fg: '#6bd1ff', bg: 'rgba(107,209,255,0.10)' },
    shock:    { fg: '#ff6b8a', bg: 'rgba(255,107,138,0.10)' },
  };
  if (fixed[key]) return fixed[key];
  const idx = CATEGORIES.findIndex(c => c.key === key);
  const hue = (idx * 47) % 360;
  return { fg: `hsl(${hue}, 70%, 70%)`, bg: `hsla(${hue}, 70%, 70%, 0.12)` };
}

/* ============================================================
 * 자동 분류 — 우선순위 순으로 매칭
 * ============================================================ */

function classify(text) {
  const t = text.trim();
  if (!t) return 'etc';

  // 템플릿 패턴은 항상 우선
  if (/_{2,}|○○|OO|XX|\[.+?\]/.test(t)) return 'template';

  // 짧은 키워드/구문은 토픽 매칭보다 우선해서 '표현/단어'로 (예: 외모 하락장, 족저근막염)
  const words = t.split(/\s+/);
  if (words.length <= 2 && t.length <= 12 && !/[?!.…]/.test(t)) return 'phrase';

  // 그 외 토픽 규칙
  for (const [key, re] of RULES) {
    if (key === 'template') continue;
    if (re.test(t)) return key;
  }

  // 좀 더 긴 짧은 구문도 마지막에 phrase로
  if (words.length <= 3 && t.length <= 14 && !/[?!.…]/.test(t)) return 'phrase';

  return 'etc';
}

/* ============================================================
 * Supabase storage layer
 * - 로컬 items 배열은 캐시 역할
 * - 모든 변경은 즉시 로컬에 반영 + 백그라운드로 Supabase 동기화
 * ============================================================ */
let items = [];
let currentUser = null;

function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.classList.remove('syncing', 'error');
  if (state === 'syncing') dot.classList.add('syncing');
  else if (state === 'error') dot.classList.add('error');
  dot.title = state === 'syncing' ? '동기화 중…' : state === 'error' ? '동기화 실패' : '동기화 완료';
}

const Storage = {
  async loadAll() {
    setSyncStatus('syncing');
    const { data, error } = await supabase
      .from('titles')
      .select('id, text, category, created_at')
      .order('created_at', { ascending: false });
    if (error) {
      console.error('loadAll error:', error);
      setSyncStatus('error');
      return [];
    }
    setSyncStatus('idle');
    return data.map(d => ({
      id: d.id,
      text: d.text,
      category: d.category,
      createdAt: Number(d.created_at)
    }));
  },
  async insertMany(newItems) {
    if (!newItems.length) return;
    setSyncStatus('syncing');
    const rows = newItems.map(i => ({
      id: i.id,
      text: i.text,
      category: i.category,
      created_at: i.createdAt,
      user_id: currentUser.id
    }));
    const { error } = await supabase.from('titles').insert(rows);
    if (error) { console.error('insert error:', error); setSyncStatus('error'); alert('저장 실패: ' + error.message); return; }
    setSyncStatus('idle');
  },
  async deleteOne(id) {
    setSyncStatus('syncing');
    const { error } = await supabase.from('titles').delete().eq('id', id);
    if (error) { console.error('delete error:', error); setSyncStatus('error'); return; }
    setSyncStatus('idle');
  },
  async deleteAll() {
    setSyncStatus('syncing');
    const { error } = await supabase.from('titles').delete().eq('user_id', currentUser.id);
    if (error) { console.error('deleteAll error:', error); setSyncStatus('error'); alert('삭제 실패: ' + error.message); return; }
    setSyncStatus('idle');
  },
  async updateCategory(id, category) {
    setSyncStatus('syncing');
    const { error } = await supabase.from('titles').update({ category }).eq('id', id);
    if (error) { console.error('update error:', error); setSyncStatus('error'); return; }
    setSyncStatus('idle');
  }
};

const $ = (sel) => document.querySelector(sel);

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function pillStyle(catKey) {
  const c = catColors(catKey);
  return `color:${c.fg};background:${c.bg};`;
}

function parseTitles(raw) {
  return raw.split(/\r?\n+/)
    .map(s => s.trim())
    // 빈 줄, 그리고 '-', '=', '*', '_', '~' 만으로 이루어진 구분선 제외
    .filter(s => s && !/^[-=*_~·•]+$/.test(s));
}

let vipMode = false;
let hitMode = false;

function updateToggles() {
  const vip = $('#vipToggle');
  vip.classList.toggle('on', vipMode);
  vip.querySelector('.state').textContent = vipMode ? 'ON' : 'OFF';
  const hit = $('#hitToggle');
  hit.classList.toggle('on', hitMode);
  hit.querySelector('.state').textContent = hitMode ? 'ON' : 'OFF';
}

async function addItem() {
  const raw = $('#newTitle').value;
  const titles = parseTitles(raw);
  if (!titles.length) return;
  let vipCount = 0, hitCount = 0;
  const newOnes = [];
  for (let text of titles) {
    let forced = null; // 'vip' | 'hitword' | null
    if (text.startsWith('*')) {
      text = text.replace(/^\*+\s*/, '').trim();
      if (!text) continue;
      forced = 'vip';
    }
    if (!forced && vipMode) forced = 'vip';
    if (!forced && hitMode) forced = 'hitword';
    const category = forced || classify(text);
    if (forced === 'vip') vipCount++;
    if (forced === 'hitword') hitCount++;
    const item = { id: uid(), text, category, createdAt: Date.now() };
    newOnes.push(item);
    items.unshift(item);
  }
  $('#newTitle').value = '';
  const extras = [];
  if (vipCount) extras.push(`👑 ${vipCount}`);
  if (hitCount) extras.push(`🔥 ${hitCount}`);
  const tail = extras.length ? ` (${extras.join(' · ')})` : '';
  flashHint(`✓ ${titles.length}개 추가됨${tail}`);
  render();
  await Storage.insertMany(newOnes);
}

function flashHint(msg) {
  const hint = $('#addHint');
  if (!hint) return;
  const original = hint.innerHTML;
  hint.innerHTML = `<span class="ok">${msg}</span>`;
  setTimeout(() => { hint.innerHTML = original; }, 1500);
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render();
  await Storage.deleteOne(id);
}

async function changeCategory(id, newCat) {
  const it = items.find(i => i.id === id);
  if (it) {
    it.category = newCat;
    render();
    await Storage.updateCategory(id, newCat);
  }
}

  if (!confirm(`전체 ${items.length}개 타이틀을 삭제할까요?`)) return;

/* ============================================================
 * 랜덤 조합 — 두 타이틀을 분해해서 재조합
 * ============================================================ */
function splitHalf(text) {
  // 1순위: 콤마/구분자
  const parts = text.split(/[,，:：—–]/).map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) {
    const mid = Math.ceil(parts.length / 2);
    return [parts.slice(0, mid).join(', '), parts.slice(mid).join(', ')];
  }
  // 2순위: 공백
  const words = text.split(/\s+/);
  if (words.length < 2) return [text, ''];
  const mid = Math.ceil(words.length / 2);
  return [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
}

function mashTwo() {
  if (items.length < 2) return null;
  const a = items[Math.floor(Math.random() * items.length)];
  let b;
  let tries = 0;
  do {
    b = items[Math.floor(Math.random() * items.length)];
    tries++;
  } while (b.id === a.id && tries < 10);
  if (b.id === a.id) return null;
  const [aFront] = splitHalf(a.text);
  const [, bBack] = splitHalf(b.text);
  if (!aFront || !bBack) return null;
  return `${aFront} ${bBack}`;
}

function renderMashups() {
  const box = $('#mashupBox');
  if (items.length < 2) {
    box.innerHTML = '<div class="mash-empty">조합하려면 최소 2개의 타이틀이 필요해요</div>';
    return;
  }
  const out = [];
  const seen = new Set();
  let attempts = 0;
  while (out.length < 5 && attempts < 40) {
    attempts++;
    const m = mashTwo();
    if (m && !seen.has(m)) { out.push(m); seen.add(m); }
  }
  if (!out.length) {
    box.innerHTML = '<div class="mash-empty">조합이 만들어지지 않았어요. 더 많은 타이틀을 추가해주세요</div>';
    return;
  }
  box.innerHTML = out.map(m =>
    `<div class="mash-item" title="클릭해서 복사">${escapeHtml(m)}</div>`
  ).join('');
  // 클릭 시 클립보드 복사
  box.querySelectorAll('.mash-item').forEach(el => {
    el.addEventListener('click', () => {
      navigator.clipboard?.writeText(el.textContent).then(() => {
        const orig = el.style.borderColor;
        el.style.borderColor = 'var(--accent)';
        const old = el.textContent;
        el.textContent = '✓ 복사됨';
        setTimeout(() => { el.textContent = old; el.style.borderColor = orig; }, 800);
      });
    });
  });
}

/* ============================================================
 * 카테고리 바 / 리스트
 * ============================================================ */
function renderCatBar(barEl, current, onChange) {
  const total = items.length;
  let html = `<button data-cat="all" class="${current==='all'?'on':''}">전체 <span class="num">${total}</span></button>`;
  for (const c of CATEGORIES) {
    const n = items.filter(i => i.category === c.key).length;
    if (n === 0) continue;
    html += `<button data-cat="${c.key}" class="${current===c.key?'on':''}">${c.label} <span class="num">${n}</span></button>`;
  }
  barEl.innerHTML = html;
  barEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => onChange(b.dataset.cat));
  });
}

function markPrefix(cat) {
  if (cat === 'vip') return '👑 ';
  if (cat === 'hitword') return '🔥 ';
  return '';
}

function itemHtml(i) {
  const opts = CATEGORIES.map(c =>
    `<option value="${c.key}" ${c.key===i.category?'selected':''}>${c.label}</option>`
  ).join('');
  const crown = markPrefix(i.category);
  return `
    <div class="item">
      <span class="title">${crown}${escapeHtml(i.text)}</span>
      <span class="cat-pill" style="${pillStyle(i.category)}">
        <select data-id="${i.id}" class="cat-select">${opts}</select>
      </span>
      <button class="del" data-id="${i.id}" title="삭제">×</button>
    </div>
  `;
}

function render() {
  renderCatBar($('#randomCatBar'), randomCategory, c => { randomCategory = c; render(); });
  renderCatBar($('#filterCatBar'), activeCategory, c => { activeCategory = c; render(); });

  const filtered = items.filter(i => {
    if (activeCategory !== 'all' && i.category !== activeCategory) return false;
    if (searchQuery && !i.text.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });
  $('#count').textContent = `${filtered.length}개`;

  const content = $('#content');
  if (!filtered.length) {
    content.innerHTML = '<div class="empty">' + (items.length ? '결과가 없어요' : '아직 타이틀이 없어요') + '</div>';
    return;
  }

  if (activeCategory === 'all') {
    const groups = {};
    for (const i of filtered) (groups[i.category] = groups[i.category] || []).push(i);
    const order = CATEGORIES.map(c => c.key).filter(k => groups[k]);
    content.innerHTML = order.map(k => `
      <div class="group">
        <div class="group-title">
          <span class="cat-pill" style="${pillStyle(k)}"><select disabled><option>${CAT_LABEL[k]}</option></select></span>
          <span class="line"></span>
          <span>${groups[k].length}</span>
        </div>
        <div class="list">${groups[k].map(itemHtml).join('')}</div>
      </div>
    `).join('');
  } else {
    content.innerHTML = `<div class="list">${filtered.map(itemHtml).join('')}</div>`;
  }

  content.querySelectorAll('.del').forEach(btn =>
    btn.addEventListener('click', () => deleteItem(btn.dataset.id))
  );
  content.querySelectorAll('.cat-select').forEach(sel =>
    sel.addEventListener('change', e => changeCategory(sel.dataset.id, e.target.value))
  );
}

/* ============================================================
 * Backup / Restore
 * ============================================================ */
function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportJson() {
  const date = new Date().toISOString().slice(0, 10);
  downloadBlob(JSON.stringify(items, null, 2), `title-vault-${date}.json`, 'application/json');
}

function copyForClaude() {
  if (!items.length) { alert('복사할 타이틀이 없어요.'); return; }
  const lines = [];
  lines.push('# 내 타이틀 보관함 (Claude 분석용)');
  lines.push(`총 ${items.length}개`);
  lines.push('');
  for (const c of CATEGORIES) {
    const group = items.filter(i => i.category === c.key);
    if (!group.length) continue;
    lines.push(`## ${c.label} (${group.length}개)`);
    for (const i of group) lines.push(`- ${i.text}`);
    lines.push('');
  }
  lines.push('---');
  lines.push('위 데이터를 참고해서 다음을 도와줘:');
  lines.push('1. 내가 자주 끌리는 후킹 패턴 분석');
  lines.push('2. [원하는 주제]에 어울리는 새 후킹 타이틀 5개 추천');
  lines.push('   (특히 👑 VIP와 🔥 히트단어의 톤을 참고)');
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    alert('✓ 클립보드에 복사됨!\n\n클로드 대화창에 붙여넣고 원하는 주제를 적어 요청하세요.');
  }).catch(() => {
    // 폴백: textarea로 수동 복사
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
    alert('✓ 복사됨 (수동 모드)');
  });
}

function exportTxt() {
  if (!items.length) { alert('내보낼 타이틀이 없어요.'); return; }
  const date = new Date().toISOString().slice(0, 10);
  const lines = [];
  for (const c of CATEGORIES) {
    const group = items.filter(i => i.category === c.key);
    if (!group.length) continue;
    lines.push(`[${c.label}]`);
    for (const i of group) lines.push(i.text);
    lines.push('');
  }
  downloadBlob(lines.join('\n').trim() + '\n', `title-vault-${date}.txt`, 'text/plain;charset=utf-8');
}

function importJson(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error('형식 오류');
      const valid = data
        .filter(d => d && typeof d.text === 'string')
        .map(d => ({
          id: d.id || uid(),
          text: d.text,
          category: (d.category && CAT_LABEL[d.category]) ? d.category : classify(d.text),
          createdAt: d.createdAt || Date.now()
        }));
      // 기존 ID와 중복 방지: 새 ID 부여
      const existingIds = new Set(items.map(i => i.id));
      for (const v of valid) {
        if (existingIds.has(v.id)) v.id = uid();
      }
      const append = confirm(`${valid.length}개를 가져옵니다.\n\n[확인] = 기존 데이터에 추가\n[취소] = 기존 전체 삭제 후 덮어쓰기`);
      if (!append) {
        // 덮어쓰기: 기존 전부 삭제
        if (!confirm('정말 기존 데이터를 모두 삭제하고 가져오기 데이터로 덮어쓸까요?')) return;
        await Storage.deleteAll();
        items = valid;
      } else {
        items = [...valid, ...items];
      }
      await Storage.insertMany(valid);
      render();
      flashHint(`✓ ${valid.length}개 가져옴`);
    } catch (e) {
      alert('가져오기 실패: ' + e.message);
    }
  };
  reader.readAsText(file);
}

/* ============================================================
 * Event wiring
 * ============================================================ */
$('#addBtn').addEventListener('click', addItem);
$('#newTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addItem(); }
});
$('#vipToggle').addEventListener('click', () => {
  vipMode = !vipMode;
  if (vipMode) hitMode = false; // 상호 배타적
  updateToggles();
});
$('#hitToggle').addEventListener('click', () => {
  hitMode = !hitMode;
  if (hitMode) vipMode = false;
  updateToggles();
});
updateToggles();
$('#search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
$('#pickBtn').addEventListener('click', pickRandom);
$('#mashBtn').addEventListener('click', renderMashups);
$('#clearBtn').addEventListener('click', clearAll);
$('#exportBtn').addEventListener('click', exportJson);
$('#exportTxtBtn').addEventListener('click', exportTxt);
$('#claudeCopyBtn').addEventListener('click', copyForClaude);
$('#importBtn').addEventListener('click', () => $('#importFile').click());
$('#importFile').addEventListener('change', e => {
  if (e.target.files[0]) importJson(e.target.files[0]);
  e.target.value = '';
});

/* ============================================================
 * Auth flow (이메일 매직링크)
 * ============================================================ */
function showAuthMsg(text, type) {
  const el = $('#authMsg');
  el.textContent = text;
  el.className = `auth-msg ${type}`;
  el.style.display = 'block';
}

let pendingEmail = '';

function showAuthStep(step) {
  $('#authStep1').style.display = step === 1 ? 'block' : 'none';
  $('#authStep2').style.display = step === 2 ? 'block' : 'none';
  $('#authStep1Hint').style.display = step === 1 ? 'block' : 'none';
  $('#authStep2Hint').style.display = step === 2 ? 'block' : 'none';
  if (step === 2) setTimeout(() => $('#authCode').focus(), 50);
  else setTimeout(() => $('#authEmail').focus(), 50);
}

async function sendOtpCode() {
  const email = $('#authEmail').value.trim();
  if (!email || !/.+@.+\..+/.test(email)) {
    showAuthMsg('올바른 이메일을 입력해주세요', 'err');
    return;
  }
  const btn = $('#authSendBtn');
  btn.disabled = true;
  btn.textContent = '전송 중…';
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: true }
  });
  btn.disabled = false;
  btn.textContent = '인증코드 받기';
  if (error) {
    showAuthMsg('실패: ' + error.message, 'err');
  } else {
    pendingEmail = email;
    $('#authMsg').style.display = 'none';
    showAuthStep(2);
  }
}

async function verifyOtpCode() {
  const code = $('#authCode').value.trim();
  if (!/^\d{4,10}$/.test(code)) {
    showAuthMsg('숫자 코드를 입력해주세요', 'err');
    return;
  }
  const btn = $('#authVerifyBtn');
  btn.disabled = true;
  btn.textContent = '확인 중…';
  const { error } = await supabase.auth.verifyOtp({
    email: pendingEmail,
    token: code,
    type: 'email'
  });
  btn.disabled = false;
  btn.textContent = '로그인';
  if (error) {
    showAuthMsg('인증 실패: ' + error.message, 'err');
  }
  // 성공시 onAuthStateChange가 처리
}

async function logout() {
  await supabase.auth.signOut();
  // onAuthStateChange가 처리하지만 즉시 UI 업데이트
  currentUser = null;
  items = [];
  showApp(false);
}

function showApp(loggedIn) {
  $('#authOverlay').style.display = loggedIn ? 'none' : 'flex';
  $('#appWrap').style.display = loggedIn ? 'block' : 'none';
}

async function initApp(user) {
  currentUser = user;
  $('#userEmail').textContent = user.email;
  showApp(true);
  // 데이터 로드
  items = await Storage.loadAll();
  // 카테고리 마이그레이션 (옛 데이터 보호)
  let needsMigration = false;
  for (const i of items) {
    if (!i.category || !CAT_LABEL[i.category]) {
      i.category = classify(i.text);
      needsMigration = true;
    }
  }
  if (needsMigration) {
    // 백그라운드로 한 번에 정리
    for (const i of items) {
      await Storage.updateCategory(i.id, i.category);
    }
  }
  render();
}

$('#authSendBtn').addEventListener('click', sendOtpCode);
$('#authVerifyBtn').addEventListener('click', verifyOtpCode);
$('#authBackBtn').addEventListener('click', () => { showAuthStep(1); $('#authMsg').style.display = 'none'; });
$('#authEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendOtpCode(); }
});
$('#authCode').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); verifyOtpCode(); }
});
$('#logoutBtn').addEventListener('click', logout);

// 세션 상태 감지
supabase.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    if (!currentUser || currentUser.id !== session.user.id) {
      initApp(session.user);
    }
  } else {
    currentUser = null;
    items = [];
    showApp(false);
  }
});

// 초기 세션 체크
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) {
    initApp(session.user);
  } else {
    showApp(false);
  }
})();
</script>
